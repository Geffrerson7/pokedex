<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="min-h-screen bg-gradient-to-br from-slate-950 via-indigo-950 to-slate-900 text-white overflow-x-hidden"
  >
    <div class="fixed inset-0 -z-10 overflow-hidden">
      <div
        class="absolute top-0 left-0 w-56 h-56 md:w-96 md:h-96 bg-cyan-500/20 rounded-full blur-3xl"
      ></div>

      <div
        class="absolute bottom-0 right-0 w-56 h-56 md:w-96 md:h-96 bg-pink-500/20 rounded-full blur-3xl"
      ></div>
    </div>

    <section class="text-center py-8 md:py-12 px-4">
      <h1
        class="text-4xl sm:text-5xl md:text-7xl lg:text-8xl font-black bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500 bg-clip-text text-transparent"
      >
        Pokédex
      </h1>

      <p class="mt-3 text-sm sm:text-base md:text-lg text-slate-300">
        Explorar • Buscar • Capturar
      </p>
    </section>

    <div class="max-w-3xl mx-auto px-4 mb-6">
      <div
        class="flex flex-col sm:flex-row gap-3 p-4 rounded-xl bg-white/10 backdrop-blur-xl border border-white/20 shadow-2xl"
      >
        <input
          id="buscador"
          type="text"
          placeholder="Busca un Pokémon..."
          class="flex-1 bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder:text-slate-300 focus:outline-none focus:ring-1 focus:ring-cyan-400"
        />

        <button
          id="btn-buscar"
          class="w-full sm:w-auto px-6 py-3 rounded-xl font-semibold bg-gradient-to-r from-cyan-500 to-blue-600 hover:scale-105 transition duration-300"
        >
          Buscar
        </button>
      </div>
    </div>

    <section
      class="max-w-6xl mx-4 md:mx-auto mt-6 md:mt-10 p-4 md:p-8 rounded-[24px] md:rounded-[32px] bg-white/5 backdrop-blur-xl border border-white/10 shadow-2xl shadow-cyan-950/30"
    >
      <div
        id="resultado"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6"
      ></div>
    </section>

    <div class="text-center my-6 px-4">
      <button
        id="cargar-mas"
        class="w-full sm:w-auto px-8 py-4 rounded-2xl bg-gradient-to-r from-purple-500 to-pink-500 font-bold transition duration-300 hover:scale-105 hover:shadow-xl hover:shadow-pink-500/30"
      >
        Cargar más
      </button>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
